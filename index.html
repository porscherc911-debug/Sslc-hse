<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSLC & HSE Calculator Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  color:#ffffff;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#020617,#1e3a8a,#2563eb,#38bdf8);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

/* Background animation */
@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Card */
.card{
  width:100%;
  max-width:520px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}

/* Fade animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* Title */
h1{
  text-align:center;
  margin-bottom:20px;
  font-size:26px;
  text-shadow:0 0 12px rgba(255,255,255,0.7);
}

/* Tabs */
.tabs{
  display:flex;
  position:relative;
  margin-bottom:25px;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  opacity:0.6;
  transition:0.3s;
}

.tab.active{
  opacity:1;
  text-shadow:0 0 8px white;
}

.tabs::after{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  width:50%;
  height:3px;
  background:white;
  box-shadow:0 0 10px white;
  transition:0.4s;
}

.tabs.hse::after{
  left:50%;
}

/* Sections */
.section{
  display:none;
  animation:slideUp 0.4s ease;
}

.section.active{
  display:block;
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Inputs */
input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.08);
  transition:0.3s;
}

input::placeholder{
  color:#e0f2fe;
}

input:focus{
  outline:none;
  border-color:white;
  box-shadow:0 0 15px rgba(255,255,255,0.6);
  transform:scale(1.02);
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  font-weight:bold;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

/* Button ripple */
button::after{
  content:'';
  position:absolute;
  width:0;
  height:300%;
  background:rgba(255,255,255,0.3);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  transition:0.5s;
}

button:hover::after{
  width:120%;
}

button:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 15px 30px rgba(34,197,94,0.5);
}

/* Result */
.result{
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.12);
  text-align:center;
  animation:pop 0.5s ease;
}

@keyframes pop{
  from{transform:scale(0.9); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.result p{
  opacity:0.9;
}

.result h2{
  font-size:28px;
  text-shadow:0 0 10px #86efac;
}

</style>
</head>

<body>

<div class="card">

<h1>✨ Percentage Calculator Pro</h1>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="showSection('sslc',this)">SSLC</div>
  <div class="tab" onclick="showSection('hse',this)">Plus One + Two</div>
</div>

<!-- SSLC -->
<div id="sslc" class="section active">
<input type="number" id="aplus" placeholder="A+ Grades">
<input type="number" id="a" placeholder="A Grades">
<input type="number" id="bplus" placeholder="B+ Grades">
<input type="number" id="b" placeholder="B Grades">
<input type="number" id="cplus" placeholder="C+ Grades">
<input type="number" id="c" placeholder="C Grades">
<input type="number" id="dplus" placeholder="D+ Grades">

<button onclick="calculateSSLC()">Calculate SSLC</button>

<div class="result">
<p id="sslcMarks"></p>
<h2 id="sslcPercent"></h2>
</div>
</div>

<!-- HSE -->
<div id="hse" class="section">
<input type="number" id="plus1" placeholder="Plus One Marks">
<input type="number" id="plus2" placeholder="Plus Two Marks">

<button onclick="calculateHSE()">Calculate HSE</button>

<div class="result">
<p id="hseTotal"></p>
<h2 id="hsePercent"></h2>
</div>
</div>

</div>

<script>
function showSection(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  el.classList.add('active');

  let tabs=document.getElementById('tabs');
  id==='hse'?tabs.classList.add('hse'):tabs.classList.remove('hse');
}

function calculateSSLC(){
  let Aplus = parseInt(document.getElementById('aplus').value) || 0;
  let A = parseInt(document.getElementById('a').value) || 0;
  let Bplus = parseInt(document.getElementById('bplus').value) || 0;
  let B = parseInt(document.getElementById('b').value) || 0;
  let Cplus = parseInt(document.getElementById('cplus').value) || 0;
  let C = parseInt(document.getElementById('c').value) || 0;
  let Dplus = parseInt(document.getElementById('dplus').value) || 0;

  let total = (Aplus*9)+(A*8)+(Bplus*7)+(B*6)+(Cplus*5)+(C*4)+(Dplus*3);
  let percentage = (total/90)*100;

  document.getElementById('sslcMarks').innerText = "Total Points: " + total;
  document.getElementById('sslcPercent').innerText = percentage.toFixed(2) + " %";
}

function calculateHSE(){
  let plus1 = parseInt(document.getElementById('plus1').value) || 0;
  let plus2 = parseInt(document.getElementById('plus2').value) || 0;

  let total = plus1 + plus2;
  let percentage = (total/1200)*100;

  document.getElementById('hseTotal').innerText = "Total: " + total + " / 1200";
  document.getElementById('hsePercent').innerText = percentage.toFixed(2) + " %";
}
</script>

</body>
</html>
